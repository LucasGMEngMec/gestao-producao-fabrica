<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">

<title>Cadastro de Lista de Materiais</title>

<link rel="stylesheet" href="cadastro_lista_materiais.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

<h2>Cadastro de Lista de Materiais</h2>

<div class="bloco-cabecalho">

<div class="campo">
<label>Obra</label>
<input type="text" id="obra">
</div>

<div class="campo">
<label>Instalação</label>
<input type="text" id="instalacao">
</div>

<div class="campo">
<label>Estrutura</label>
<input type="text" id="estrutura">
</div>

<div class="campo">
<label>Data de Cadastro</label>
<input type="text" id="dataCadastro">
</div>

<div class="campo">
<label>Revisão</label>
<input type="text" id="revisao">
</div>

</div>

<div class="tabela-container">

<table id="tabelaMateriais" style="table-layout: fixed;">

<thead>
<tr>

<th style="width:120px">Marca</th>
<th style="width:70px">Qtd</th>
<th style="width:180px">Material</th>
<th style="width:160px">Perfil</th>
<th style="width:120px">Comp. (mm)</th>
<th style="width:140px">Peso Unit. (kg)</th>
<th style="width:140px">Peso Total (kg)</th>
<th style="width:60px">Ação</th>

</tr>
</thead>

<tbody></tbody>

</table>

<br>

<button class="btn-azul" onclick="adicionarLinha()">+ Linha</button>
<button class="btn-excel" onclick="colarExcel()">📋 Colar do Excel</button>
<button id="btnFinalizar" class="btn-finalizar btn-desabilitado" disabled onclick="salvarLista()">Finalizar</button>

</html>
